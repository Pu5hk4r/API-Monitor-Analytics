version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: api-monitor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - api-monitor-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-monitor-backend
    environment:
      - DEBUG=${DEBUG:-False}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CREDENTIALS_PATH=/app/secrets/firebase-credentials.json
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SQLITE_DB_PATH=/app/database/metrics.db
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-7}
      - MONITOR_CHECK_INTERVAL_MINUTES=${MONITOR_CHECK_INTERVAL_MINUTES:-5}
      - MAX_WORKERS=${MAX_WORKERS:-10}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-30}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - MAX_CONSECUTIVE_FAILURES=${MAX_CONSECUTIVE_FAILURES:-3}
      - ALERT_COOLDOWN_MINUTES=${ALERT_COOLDOWN_MINUTES:-30}
    volumes:
      - sqlite_data:/app/database
      - app_logs:/var/log/app
      - firebase_secrets:/app/secrets:ro
    networks:
      - api-monitor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Certbot for SSL certificates (Let's Encrypt)
  certbot:
    image: certbot/certbot
    container_name: api-monitor-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - api-monitor-network

volumes:
  sqlite_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  firebase_secrets:
    driver: local

networks:
  api-monitor-network:
    driver: bridge
